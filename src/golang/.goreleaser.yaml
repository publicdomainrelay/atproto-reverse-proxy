version: 2

project_name: atproto-reverse-proxy

before:
  hooks:
    - go mod tidy

builds:
  - id: atprp-ssh-relay
    main: ./cmd/atprp-ssh-relay
    binary: atprp-ssh-relay
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: caddy-check-dns-from-config
    main: ./cmd/caddy-check-dns-from-config
    binary: caddy-check-dns-from-config
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: fedproxy-client
    main: ./cmd/fedproxy-client
    binary: fedproxy-client
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: oauth-client-webapp
    main: ./cmd/oauth-client-webapp
    binary: oauth-client-webapp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    allow_different_binary_count: true

checksum:
  name_template: checksums.txt

release:
  make_latest: true
  replace_existing_draft: true
