name: Deploy via SSH

on:
  push:
    branches:
      - main

permissions: {}

env:
  SSH_TARGET: 'deploy@fedproxy.com'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Build golang
      run: |
        cd src/golang/
        mkdir -p target
        go build -o target/atprp-ssh-relay ./cmd/atprp-ssh-relay/main.go

    - name: Install opkssh
      run: curl -sSLf https://raw.githubusercontent.com/openpubkey/opkssh/main/scripts/install-linux.sh | sudo bash

    - name: Login
      run: opkssh login github

    - name: SSH runner helper
      shell: cp {0} run-via-ssh.sh
      run: |
        set -xeuo pipefail
        ssh -i /.ssh/id_ecdsa -o StrictHostKeyChecking=accept-new "${SSH_TARGET}" bash -xe < "${1}"

    - name: Run commands on server
      shell: bash -e run-via-ssh.sh {0}
      run: |
        sudo apt-get update
        sudo apt-get install -y caddy
        rm -rf /tmp/new-www

    - name: Copy over files
      shell: bash -e run-via-ssh.sh {0}
      run: |
        scp -i /.ssh/id_ecdsa -o StrictHostKeyChecking=accept-new "${SSH_TARGET}" src/golang/Caddyfile /etc/caddy/Caddyfile
        scp -r -i /.ssh/id_ecdsa -o StrictHostKeyChecking=accept-new "${SSH_TARGET}" src/javascript/fedproxy-ssh-public-keys /tmp/new-www
        scp -i /.ssh/id_ecdsa -o StrictHostKeyChecking=accept-new "${SSH_TARGET}" src/golang/target/atprp-ssh-relay /usr/bin/atprp-ssh-relay

    - name: Run commands on server
      shell: bash -e run-via-ssh.sh {0}
      run: |
        sudo rm -rf /var/www/html
        sudo mv /tmp/new-www /var/www/html
        sudo systemctl enable --now caddy
        sudo systemctl kill --signal=SIGUSR1 caddy
