name: Deploy via SSH

on:
  push:
    branches:
      - main

permissions: {}

env:
  SSH_TARGET: 'deploy@fedproxy.com'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install opkssh
      run: curl -sSLf https://raw.githubusercontent.com/openpubkey/opkssh/main/scripts/install-linux.sh | sudo bash

    - name: Login
      run: opkssh login github

    - name: Run commands on server
      run: |
        bash -xe scripts/deploy.sh
